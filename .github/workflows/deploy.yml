name: Deploy Self-Healing CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/self-healing-cicd
          git pull origin main

      - name: Install dependencies
        run: |
          cd /home/self-healing-cicd
          /root/.local/bin/uv sync

      - name: Restart service
        run: sudo systemctl restart self-healing-cicd

      - name: Health check
        run: |
          sleep 5
          for i in {1..10}; do
            if sudo systemctl is-active --quiet self-healing-cicd; then
              echo "Service is running ($i/10)"
              exit 0
            fi
            echo "Waiting... ($i/10)"
            sleep 3
          done
          echo "Health check failed!"
          journalctl -u self-healing-cicd -n 50 --no-pager
          exit 1

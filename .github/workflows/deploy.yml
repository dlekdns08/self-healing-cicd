name: Deploy Self-Healing CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /app/self-healing-cicd
          git pull origin main

      - name: Build and run
        run: |
          cd /app/self-healing-cicd
          docker compose down || true
          docker compose up -d --build

      - name: Health check
        run: |
          sleep 5
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health 2>/dev/null || echo "000")
            echo "Status: $STATUS ($i/15)"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed!"
          cd /app/self-healing-cicd
          docker compose logs --no-color > /tmp/self-healing-logs.txt 2>&1 || true
          docker compose down || true
          exit 1
